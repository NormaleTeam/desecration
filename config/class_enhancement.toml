
#General Settings
[general]
	#If true, disables the built-in classes (Warrior, Ranger, Tank, Civilian) so only custom classes are available.
	disableDefaultClasses = true

#UI Text Configuration
[ui]
	#Text displayed on the Undo button.
	undoButtonText = "UNDO"
	#Text displayed on the Confirm button.
	confirmButtonText = "CONFIRM SELECTION"
	#Scale modifier for the Class Selection GUI (1.0 = Default size, 1.5 = 50% larger).
	guiScale = 1.0
	#Number of custom class slots (1-100). Restart required.
	#Range: 1 ~ 100
	customClassSlots = 6

#Built-In Class Settings.
[classes]

	[classes.warrior]
		#Display name shown in GUI.
		name = "Knight"
		#Lore text. Supports '&' color codes.
		description = "Born to swing a sword."
		#Cosmetic stat lines.
		stats = ["&a+2 Damage", "&a+2 Health", "&c-20% Speed"]
		#Stat modifiers.
		attributes = ["minecraft:generic.attack_damage=2.0", "minecraft:generic.max_health=2.0", "minecraft:generic.movement_speed=-0.20:multiply_base"]
		#Item to equip in Main Hand. Format: modid:item{nbt}=count
		main_hand = "minecraft:stone_sword=1"
		#Item to equip in Off Hand. Format: modid:item{nbt}=count
		off_hand = "minecraft:shield=1"
		#Items to equip in Armor slots. Format: modid:item{nbt}=count
		armor = []
		#Items to place in Inventory. Format: modid:item{nbt}=count
		items = []
		#Commands to execute when this class is selected. Use %player% for player name.
		commands = []

	[classes.ranger]
		#Display name shown in GUI.
		name = "Ranged"
		#Lore text. Supports '&' color codes.
		description = "You are quick with your movements, sharp with your shots."
		#Cosmetic stat lines.
		stats = ["&a+20% Speed", "&c-2 Health"]
		#Stat modifiers.
		attributes = ["minecraft:generic.movement_speed=0.20:multiply_base", "minecraft:generic.max_health=-2.0"]
		#Item to equip in Main Hand. Format: modid:item{nbt}=count
		main_hand = "minecraft:bow=1"
		#Item to equip in Off Hand. Format: modid:item{nbt}=count
		off_hand = ""
		#Items to equip in Armor slots. Format: modid:item{nbt}=count
		armor = []
		#Items to place in Inventory. Format: modid:item{nbt}=count
		items = ["minecraft:arrow=32"]
		#Commands to execute when this class is selected. Use %player% for player name.
		commands = []

	[classes.tank]
		#Display name shown in GUI.
		name = "Tank"
		#Lore text. Supports '&' color codes.
		description = "Born slightly larger than average, you are able to take more damage."
		#Cosmetic stat lines.
		stats = ["&a+10 Health", "&c-15% Speed"]
		#Stat modifiers.
		attributes = ["minecraft:generic.max_health=10.0", "minecraft:generic.movement_speed=-0.15:multiply_base", "minecraft:generic.knockback_resistance=0.5"]
		#Item to equip in Main Hand. Format: modid:item{nbt}=count
		main_hand = ""
		#Item to equip in Off Hand. Format: modid:item{nbt}=count
		off_hand = ""
		#Items to equip in Armor slots. Format: modid:item{nbt}=count
		armor = ["minecraft:iron_chestplate=1"]
		#Items to place in Inventory. Format: modid:item{nbt}=count
		items = []
		#Commands to execute when this class is selected. Use %player% for player name.
		commands = []

	[classes.none]
		#Display name shown in GUI.
		name = "Civilian"
		#Lore text. Supports '&' color codes.
		description = "No stat changes. You were born without any talent at all."
		#Cosmetic stat lines.
		stats = ["&7No stat changes."]
		#Stat modifiers.
		attributes = []
		#Item to equip in Main Hand. Format: modid:item{nbt}=count
		main_hand = ""
		#Item to equip in Off Hand. Format: modid:item{nbt}=count
		off_hand = ""
		#Items to equip in Armor slots. Format: modid:item{nbt}=count
		armor = []
		#Items to place in Inventory. Format: modid:item{nbt}=count
		items = ["minecraft:bread=5"]
		#Commands to execute when this class is selected. Use %player% for player name.
		commands = []

