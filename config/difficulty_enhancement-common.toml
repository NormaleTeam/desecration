
#═══════════════════════════════════════
#  DIFFICULTY ENHANCEMENT CONFIGURATION
#═══════════════════════════════════════
#
#This mod adds configurable difficulty levels with various
#mechanics like bleeding, crippling, and vengeful AI.
[general]
	#Entity IDs that will NOT be affected by difficulty changes
	#Format: 'minecraft:entity_name' or 'modid:entity_name'
	#Examples: 'minecraft:villager', 'minecraft:iron_golem'
	entityBlacklist = ["minecraft:armor_stand", "minecraft:painting", "minecraft:item_frame", "minecraft:glow_item_frame"]
	#Apply difficulty modifiers to boss mobs (wither, ender dragon, etc.)
	applyToBosses = false
	#Apply difficulty modifiers to players (for multiplayer PvP scenarios)
	applyToPlayers = false
	#Number of custom difficulty slots available (0-10)
	#Range: 0 ~ 10
	customDifficultySlots = 0
	#Order of difficulties in the selection menu (first = top)
	#Use difficulty IDs: cozy, normal, extreme, torture, chaos, or custom IDs
	difficultyOrder = ["cozy", "normal", "extreme", "torture"]
	#Enable debug logging for troubleshooting
	debugMode = false

#Vengeful AI Configuration
#When enabled, passive mobs will fight back when attacked
[vengeful_ai]
	#Master toggle for vengeful AI (can be overridden per-difficulty)
	enableVengefulAI = true
	#Movement speed multiplier for vengeful mobs
	#Range: 0.1 ~ 5.0
	vengefulSpeed = 1.2
	#Base damage for vengeful mobs without attack damage attribute
	#Range: 0.5 ~ 100.0
	vengefulDamage = 2.0
	#Attack cooldown in ticks (20 ticks = 1 second)
	#Range: 1 ~ 200
	vengefulAttackCooldown = 20
	#Range in blocks for nearby passive mobs to aggro when one is attacked
	#Range: 1.0 ~ 64.0
	vengefulAggroRange = 16.0
	#Whether baby animals can also become vengeful
	vengefulAffectBabyAnimals = false
	#Entity IDs that will never become vengeful
	#Useful for excluding specific animals or villager types
	vengefulEntityBlacklist = ["minecraft:bat", "minecraft:parrot"]

#Global Mechanic Settings
#These are the default values used by difficulties that enable these mechanics
[mechanics]
	#Master toggle for bleeding mechanic
	enableBleeding = true
	#Master toggle for crippling mechanic
	enableCrippling = true
	#Default lifesteal amount for difficulties that enable it
	#Range: 0.0 ~ 20.0
	lifestealAmount = 1.0
	#Default exhaustion amount added per hit
	#Range: 0.0 ~ 40.0
	exhaustionAmount = 0.5
	#Chance (0.0-1.0) to apply bleeding when hit
	#Range: 0.0 ~ 1.0
	bleedingChance = 0.1
	#Chance (0.0-1.0) to apply crippling in combat
	#Range: 0.0 ~ 1.0
	cripplingChance = 0.2
	#Duration of bleeding effect in ticks
	#Range: 20 ~ 1200
	bleedingDuration = 100
	#Duration of crippling effect in ticks
	#Range: 20 ~ 1200
	cripplingDuration = 200

#Cozy Difficulty Settings
#A relaxed, easier experience with passive regeneration
[cozy]
	#Enable Cozy difficulty in the selection menu
	enabled = true
	#Display name for Cozy difficulty
	name = "Cozy"
	#Recommendation text shown in the UI
	recommendation = "For a relaxing, stress-free experience"
	#Health multiplier for mobs
	#Range: 0.1 ~ 10.0
	hpMultiplier = 0.5
	#Damage multiplier for mobs
	#Range: 0.1 ~ 10.0
	dmgMultiplier = 0.5
	#Fall damage multiplier for players
	#Range: 0.0 ~ 10.0
	fallDmgMultiplier = 0.5
	#Enable passive health regeneration
	enableRegen = true
	#Amount of health regenerated per tick
	#Range: 0.0 ~ 20.0
	regenAmount = 0.5
	#Ticks between regeneration (20 = 1 second)
	#Range: 1 ~ 1200
	regenSpeed = 40
	#Slowly restore air while underwater
	underwaterBreathing = true
	#Background color (hex)
	bgColor = "#050F0F"
	#Accent color (hex)
	accentColor = "#55FFFF"

#Normal Difficulty Settings
#The standard balanced Minecraft experience
[normal]
	#Enable Normal difficulty in the selection menu
	enabled = true
	#Display name for Normal difficulty
	name = "Normal"
	#Recommendation text shown in the UI
	recommendation = "Recommended for first-time players"
	#Health multiplier for mobs
	#Range: 0.1 ~ 10.0
	hpMultiplier = 1.0
	#Damage multiplier for mobs
	#Range: 0.1 ~ 10.0
	dmgMultiplier = 1.0
	#Fall damage multiplier for players
	#Range: 0.0 ~ 10.0
	fallDmgMultiplier = 1.0
	#Background color (hex)
	bgColor = "#07070F"
	#Accent color (hex)
	accentColor = "#D4A843"

#Extreme Difficulty Settings
#A challenging experience for experienced players
[extreme]
	#Enable Extreme difficulty in the selection menu
	enabled = true
	#Display name for Extreme difficulty
	name = "Extreme"
	#Recommendation text shown in the UI
	recommendation = "For experienced players seeking a challenge"
	#Health multiplier for mobs
	#Range: 0.1 ~ 10.0
	hpMultiplier = 2.0
	#Damage multiplier for mobs
	#Range: 0.1 ~ 10.0
	dmgMultiplier = 1.5
	#Fall damage multiplier for players
	#Range: 0.0 ~ 10.0
	fallDmgMultiplier = 2.0
	#Background color (hex)
	bgColor = "#0F0A05"
	#Accent color (hex)
	accentColor = "#FF8833"

#Torture Difficulty Settings
#Maximum suffering - bleeding, crippling, and more
[torture]
	#Enable Torture difficulty in the selection menu
	enabled = true
	#Display name for Torture difficulty
	name = "Torture"
	#Recommendation text shown in the UI
	recommendation = "Only for masochists. You've been warned."
	#Health multiplier for mobs
	#Range: 0.1 ~ 10.0
	hpMultiplier = 3.0
	#Damage multiplier for mobs
	#Range: 0.1 ~ 10.0
	dmgMultiplier = 2.0
	#Fall damage multiplier for players
	#Range: 0.0 ~ 10.0
	fallDmgMultiplier = 3.0
	#Lifesteal amount for hostile mobs
	#Range: 0.0 ~ 20.0
	lifestealAmount = 1.0
	#Exhaustion added to player on hit
	#Range: 0.0 ~ 40.0
	exhaustionAmount = 0.5
	#Background color (hex)
	bgColor = "#100505"
	#Accent color (hex)
	accentColor = "#FF3333"

#Chaos Difficulty Settings
#A hidden difficulty unlocked by completing a specific advancement
[chaos]
	#Enable Chaos difficulty (requires unlock)
	enabled = true
	#Display name for Chaos difficulty
	name = "Chaos"
	#Recommendation text shown in the UI
	recommendation = "Beyond mortal comprehension."
	#Health multiplier for mobs
	#Range: 0.1 ~ 100.0
	hpMultiplier = 5.0
	#Damage multiplier for mobs
	#Range: 0.1 ~ 100.0
	dmgMultiplier = 3.0
	#Fall damage multiplier for players
	#Range: 0.0 ~ 100.0
	fallDmgMultiplier = 5.0
	#Lifesteal amount for hostile mobs
	#Range: 0.0 ~ 20.0
	lifestealAmount = 2.0
	#Exhaustion added to player on hit
	#Range: 0.0 ~ 40.0
	exhaustionAmount = 1.0
	#Background color (hex)
	bgColor = "#0A0005"
	#Accent color (hex) - Note: Chaos uses rainbow cycling
	accentColor = "#FF0000"
	#Advancement ID required to unlock Chaos difficulty
	#Format: 'modid:advancement_path'
	unlockAdvancement = "armageddon_mod:the_shadow_keeper"

