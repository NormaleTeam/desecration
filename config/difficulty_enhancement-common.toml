
["General Settings"]
	#Enable the 'Try Linggango Modpack' message on the difficulty selection screen.
	enableAdvertisement = false
	#Order of difficulties in the GUI (by ID). Any unlisted IDs will appear at the bottom.
	difficultyOrder = ["cozy", "normal", "extreme", "torture"]
	#Scale modifier for the Difficulty Selection GUI (1.0 = Default size, 1.5 = 50% larger, etc.).
	guiScale = 1.0

["Difficulty Stats"]
	#HP Multiplier for Cozy Mode. Multiplies the player's max health (e.g. 0.7 = 70% HP).
	cozyHpMultiplier = 0.5
	#HP Multiplier for Extreme Mode. Multiplies the player's max health (e.g., 3.0 = 3x HP).
	extremeHpMultiplier = 3.0
	#HP Multiplier for Torture Mode. Multiplies the player's max health (e.g., 6.0 = 6x HP).
	tortureHpMultiplier = 6.0
	#Damage Reduction Multiplier for Cozy Mode. Multiplies incoming damage (e.g., 1.0 = 100% damage, 0.5 = 50% damage).
	cozyDmgMultiplier = 0.5
	#Damage Taken Multiplier for Extreme Mode. Multiplies incoming damage (e.g., 3.0 = 3x damage taken).
	extremeDmgMultiplier = 3.0
	#Damage Taken Multiplier for Torture Mode. Multiplies incoming damage (e.g., 6.0 = 6x damage taken).
	tortureDmgMultiplier = 6.0
	#Mining Speed Multiplier for Cozy Mode. Increases how fast you break blocks (e.g., 1.3 = 30% faster).
	cozyMiningSpeedMultiplier = 1.3
	#Fall Damage Multiplier for Extreme Mode. Increases damage taken from falling.
	extremeFallDmgMultiplier = 2.0
	#Fall Damage Multiplier for Torture Mode. Increases damage taken from falling.
	tortureFallDmgMultiplier = 3.0

[Mechanics]
	#Enable 'Vengeful AI': Animals and Villagers will attack the player if provoked.
	enableVengefulAi = true
	#Movement speed multiplier for Vengeful animals when chasing the player.
	vengefulSpeed = 1.15
	#Enable 'Crippling' effect: High fall damage or attacks can slow and weaken the player.
	enableCrippling = true
	#Chance to apply Crippling effect on hit/fall (0.0 to 1.0, where 0.2 = 20%).
	cripplingChance = 0.2
	#Enable 'Bleeding' effect: Chance to receive Wither effect when hit.
	enableBleeding = false
	#Chance to apply Bleeding effect on hit (0.0 to 1.0, where 0.1 = 10%).
	bleedChance = 0.1
	#Amount of hunger exhaustion applied to the player when hit in Torture mode.
	exhaustionAmount = 0.5
	#Amount of HP mobs heal when hitting the player in Torture mode (Vengeful AI only).
	lifestealAmount = 2.0
	#Enable extended underwater breath in Cozy Mode.
	enableCozyBreath = true
	#Ticks between restoring 1 air bubble in Cozy Mode (Higher = Slower refill). Default 4 gives ~30% more breath.
	cozyBreathTick = 4
	#Enable passive health regeneration in Cozy Mode.
	enableCozyRegen = true
	#Ticks between passive heals in Cozy Mode (20 ticks = 1 second). Default 100 = 5 seconds.
	cozyRegenSpeed = 100
	#Amount of HP to heal per tick interval in Cozy Mode (1.0 = half heart).
	cozyRegenAmount = 1.0

["Localization / Customization"]
	#Display name for Cozy Mode in the selection menu.
	cozyName = "Easy"
	#Display name for Regular Mode in the selection menu.
	normalName = "Normal"
	#Display name for Extreme Mode in the selection menu.
	extremeName = "Hard"
	#Display name for Torture Mode in the selection menu.
	tortureName = "Nightmare"
	#Recommendation text for Cozy Mode.
	cozyRecommendation = "Recommended for players that want a cozy, harmless gameplay."
	#Recommendation text for Regular Mode.
	normalRecommendation = "Recommended for casual & new players"
	#Recommendation text for Extreme Mode.
	extremeRecommendation = "Recommended for players that want challenge"
	#Recommendation text for Torture Mode.
	tortureRecommendation = "Recommended for professionals, the best players!"

["Default Difficulty Colors"]
	#Custom Colors for built-in difficulties (Use hex format like '#FF0000'. Leave blank to use defaults)
	normalBgColor = ""
	normalAccentColor = ""
	cozyBgColor = ""
	cozyAccentColor = ""
	extremeBgColor = ""
	extremeAccentColor = ""
	tortureBgColor = ""
	tortureAccentColor = ""

["Custom Difficulties"]
	#Number of custom difficulty slots (1-50). Restart required to apply amount changes.
	#Range: 1 ~ 50
	customDifficultySlots = 10

	["Custom Difficulties".custom_0]
		#Unique internal ID. Leave empty to disable.
		id = ""
		#Display name
		name = "Custom Mode"
		#Lore text shown in the panel. Use \n for new lines.
		description = "- Custom Stats"
		#Recommendation text.
		recommendation = "Recommended for custom modpacks."
		#UI Theme: 0=Green (Normal), 1=Aqua (Cozy), 2=Orange (Extreme), 3=Red (Torture)
		#Range: 0 ~ 3
		uiTheme = 0
		#HP Multiplier
		hpMultiplier = 1.0
		#Damage Taken Multiplier
		dmgMultiplier = 1.0
		#Fall Damage Multiplier
		fallDmgMultiplier = 1.0
		#Enable Bleeding
		enableBleeding = false
		#Enable Crippling
		enableCrippling = false
		#Enable Vengeful AI
		enableVengefulAi = false
		#Enable Passive Regen
		enableRegen = false
		#Mob Lifesteal Amount
		lifestealAmount = 0.0
		#Exhaustion Amount on Hit
		exhaustionAmount = 0.0
		#Commands to run automatically when this difficulty is confirmed. Use %player% for the player's name.
		commands = ["give %player% minecraft:diamond 1", "say %player% chose a custom difficulty!"]

		#Custom Colors (Use hex format like '#FF0000'. Leave blank to use uiTheme default colors)
		["Custom Difficulties".custom_0.colors]
			#Background color of the difficulty button.
			bgColor = ""
			#Accent color of the button (the colored strip at the start, borders, highlights, particles).
			accentColor = ""

		#Sound Customization (Uses standard Minecraft sound event locations, e.g., 'minecraft:ui.button.click'. Leave blank for defaults.)
		["Custom Difficulties".custom_0.sounds]
			#Sound played when hovering over the difficulty.
			hoverSound = "minecraft:ui.button.click"
			#Sound played when selecting (clicking) the difficulty.
			selectSound = "minecraft:entity.experience_orb.pickup"
			#Sound played when confirming the difficulty.
			confirmSound = "minecraft:entity.player.levelup"

